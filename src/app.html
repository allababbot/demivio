<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Kalkulator PPN terbalik Indonesia — temukan kombinasi harga, kuantitas, dan potongan untuk nilai PPN target."
    />
    <meta
      name="theme-color"
      content="#d97706"
      media="(prefers-color-scheme: light)"
    />
    <meta
      name="theme-color"
      content="#f59e0b"
      media="(prefers-color-scheme: dark)"
    />

    <!-- Open Graph / Social Sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Demivio — PPN Reverse Calculator" />
    <meta
      property="og:description"
      content="Kalkulator PPN terbalik Indonesia — temukan kombinasi harga, kuantitas, dan potongan untuk nilai PPN target."
    />
    <meta property="og:locale" content="id_ID" />

    <title>Demivio — PPN Reverse Calculator</title>
    %sveltekit.head%
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/icon/apple-touch-icon.png"
    />
    <link rel="icon" href="/icon/favicon.ico" sizes="any" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/icon/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/icon/favicon-16x16.png"
    />
    <link rel="manifest" href="/icon/site.webmanifest" />
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
